<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MCNutri — Mot de passe oublié</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0a0a; --surface:#111; --border:#2a2a2a; --accent:#c8f135; --text:#f0f0f0; --muted:#666; }
    body { background:var(--black); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(200,241,53,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,241,53,0.03) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }
    .container { position:relative; z-index:1; width:100%; max-width:420px; padding:20px; animation:fadeUp 0.6s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .logo { text-align:center; margin-bottom:40px; }
    .logo h1 { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:4px; color:var(--accent); }
    .logo p { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; }
    .card h2 { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; margin-bottom:8px; }
    .card p { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
    .field { margin-bottom:18px; }
    label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    input { width:100%; background:#1a1a1a; border:1px solid var(--border); border-radius:8px; padding:14px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s; }
    input:focus { border-color:var(--accent); }
    .btn { width:100%; padding:16px; background:var(--accent); color:var(--black); border:none; border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; cursor:pointer; margin-top:8px; transition:all 0.2s; }
    .btn:hover { background:#d4f545; transform:translateY(-1px); }
    .back { display:block; text-align:center; margin-top:20px; font-size:13px; color:var(--muted); text-decoration:none; }
    .back:hover { color:var(--text); }
    .msg { margin-top:16px; padding:12px 16px; border-radius:8px; font-size:14px; display:none; }
    .msg.success { background:rgba(200,241,53,0.1); color:var(--accent); border:1px solid rgba(200,241,53,0.2); }
    .msg.error   { background:rgba(255,80,80,0.1);  color:#ff8080;       border:1px solid rgba(255,80,80,0.2); }
  </style>
</head>
<body>
<div class="container">
  <div class="logo"><h1>MCNutri</h1><p>Récupération de compte</p></div>
  <div class="card">
    <h2>Mot de passe oublié</h2>
    <p>Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="vous@email.com">
    </div>
    <button class="btn" onclick="sendReset()">Envoyer le lien</button>
    <div id="msg" class="msg"></div>
  </div>
  <a href="index.html" class="back">← Retour à la connexion</a>
</div>
<script>
async function sendReset() {
  const email = document.getElementById("email").value;
  if (!email) { showMsg("Entrez votre email", "error"); return; }

  const res = await fetch("http://127.0.0.1:5000/forgot-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  const data = await res.json();
  showMsg(data.message, "success");
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = "block";
}
</script>
</body>
</html>
